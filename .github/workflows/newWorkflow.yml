name: Playwright Java Tests
on:
  push:
    branches: [ "dev", "main" ]  # Changed master to main
  pull_request:
    branches: [ "dev", "main" ]  # Changed master to main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      # If you are pushing from dev, you can keep this or remove it 
      # once main is your primary branch.
      with:
        ref: dev 
