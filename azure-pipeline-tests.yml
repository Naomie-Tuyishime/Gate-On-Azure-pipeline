trigger:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: JavaToolInstaller@0
  inputs:
    versionSpec: '17'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'

# 1. THE DISCOVERY STEP: This will find where pom.xml actually is
- script: |
    echo "--- CURRENT LOCATION ---"
    pwd
    echo "--- SEARCHING FOR POM.XML ---"
    find . -name "pom.xml"
  displayName: 'Find pom.xml Location'

# 2. RUN MAVEN FROM THE CORRECT FOLDER
# Note: I am using 'mvn -f' which allows us to point directly to the file
- script: |
    # This finds the pom.xml and runs maven using that file's path
    POM_PATH=$(find . -name "pom.xml" | head -n 1)
    echo "Using POM at: $POM_PATH"
    
    mvn -f "$POM_PATH" install -DskipTests
    mvn -f "$POM_PATH" exec:java -e -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install --with-deps"
  displayName: 'Install Playwright and Browsers'

- script: |
    POM_PATH=$(find . -name "pom.xml" | head -n 1)
    mvn -f "$POM_PATH" test
  displayName: 'Run Playwright Java Tests'

- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/target/surefire-reports/TEST-*.xml'
  displayName: 'Publish Test Results'