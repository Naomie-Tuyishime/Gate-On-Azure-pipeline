# This trigger tells Azure to run on EVERY branch
trigger:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  projectRoot: '$(System.DefaultWorkingDirectory)'

steps:
- task: JavaToolInstaller@0
  inputs:
    versionSpec: '17'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'

# 1. Debug: List files to ensure we are in the correct directory
- script: |
    echo "Checking directory structure..."
    ls -R
  displayName: 'List Files for Debugging'

# 2. Build and Install Playwright
# 'install --with-deps' handles both browser binaries and Linux OS dependencies
- script: |
    mvn install -DskipTests
    mvn exec:java -e -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install --with-deps"
  displayName: 'Install Playwright and Browsers'
  workingDirectory: $(projectRoot)

# 3. Run Tests
- script: mvn test
  displayName: 'Run Playwright Java Tests'
  workingDirectory: $(projectRoot)

# 4. Publish Results
- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/target/surefire-reports/TEST-*.xml'
    mergeTestResults: true
    failTaskOnFailedTests: true
  displayName: 'Publish Test Results'