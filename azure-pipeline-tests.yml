trigger:
- dev
- master

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Set up the Java environment
- task: JavaToolInstaller@0
  inputs:
    versionSpec: '17'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'

# 2. Install Playwright browsers (This is the critical part for testers!)
# We use the Maven exec plugin to tell Playwright to install its own browser binaries
- script: mvn exec:java -e -Dexec.mainClass="com.microsoft.playwright.CLI" -Dexec.args="install-deps"
  displayName: 'Install Playwright Browser Dependencies'

# 3. Run the actual tests
- script: mvn test
  displayName: 'Run Playwright Java Tests'

# 4. Report the results back to the Azure "Tests" tab
- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/TEST-*.xml'
    mergeTestResults: true
    failTaskOnFailedTests: true
  displayName: 'Publish Test Results to Azure'